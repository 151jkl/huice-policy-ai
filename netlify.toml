# ============================================
# Netlify 部署配置
# ============================================

[build]
  base    = "frontend"
  publish = "dist"
  command = "npm run build"

# SPA fallback: React Router 需要所有未匹配路径都指向 index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# 安全与缓存
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"

# 静态资源长缓存
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
