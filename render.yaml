# ============================================
# Render 部署配置（后端服务）
# 部署入口：https://render.com/dashboard
# ============================================
services:
  - type: web
    name: huice-backend
    runtime: node
    # 项目根目录指向 backend
    rootDir: backend
    # 构建命令：在 backend 目录里安装依赖
    buildCommand: npm install
    # 启动命令：运行后端服务
    startCommand: node src/app.js
    # 免费实例
    plan: free
    # 健康检查路径
    healthCheckPath: /api/health
    # 环境变量（部署时在 Render 后台手动填 LLM_API_KEY 更安全）
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_MODEL
        value: deepseek-chat
      # ⚠️ LLM_API_KEY 不要写在这里！在 Render 后台手动添加（加密存储）
      # - key: LLM_API_KEY
      #   sync: false
